<!DOCTYPE html>
<html>
<head>
  <title>Pyramid Net Slider</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
    }

    canvas {
      background: white;
      border: 2px solid #ccc;
      margin-top: 10px;
    }

    input {
      width: 400px;
    }
  </style>
</head>
<body>

<h1>Pyramid Net Interactive</h1>
<p>Drag the slider to open or close the net.</p>

<label>Open Net</label>
<input type="range" id="foldSlider" min="0" max="100" value="100">
<label>Close Pyramid</label>

<br>
<canvas id="canvas" width="700" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const slider = document.getElementById("foldSlider");

slider.addEventListener("input", draw);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawPolygon(points, colour, alpha = 1, label = "") {
  ctx.save();
  ctx.globalAlpha = alpha;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }

  ctx.closePath();
  ctx.fillStyle = colour;
  ctx.fill();
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();

  if (label) {
    const cx = points.reduce((sum, p) => sum + p.x, 0) / points.length;
    const cy = points.reduce((sum, p) => sum + p.y, 0) / points.length;
    ctx.fillStyle = "black";
    ctx.font = "18px Arial";
    ctx.fillText(label, cx - 20, cy);
  }
}

function draw() {
  clearCanvas();

  const t = slider.value / 100; 
  // t = 1 means open net
  // t = 0 means closed pyramid

  const base = [
    {x: 300, y: 240},
    {x: 400, y: 240},
    {x: 400, y: 340},
    {x: 300, y: 340}
  ];

  const apexClosed = {x: 350, y: 120};

  const topApexOpen = {x: 350, y: 120};
  const bottomApexOpen = {x: 350, y: 460};
  const leftApexOpen = {x: 180, y: 290};
  const rightApexOpen = {x: 520, y: 290};

  function mix(openPoint, closedPoint) {
    return {
      x: closedPoint.x + (openPoint.x - closedPoint.x) * t,
      y: closedPoint.y + (openPoint.y - closedPoint.y) * t
    };
  }

  const topApex = mix(topApexOpen, apexClosed);
  const bottomApex = mix(bottomApexOpen, apexClosed);
  const leftApex = mix(leftApexOpen, apexClosed);
  const rightApex = mix(rightApexOpen, apexClosed);

  // Base is solid
  drawPolygon(base, "#ffd633", 1, "Base");

  // Other faces are slightly translucent
  drawPolygon([base[0], base[1], topApex], "#ffeb80", 0.6, "Face");
  drawPolygon([base[2], base[3], bottomApex], "#ffeb80", 0.6, "Face");
  drawPolygon([base[3], base[0], leftApex], "#ffeb80", 0.6, "Face");
  drawPolygon([base[1], base[2], rightApex], "#ffeb80", 0.6, "Face");

  ctx.fillStyle = "#333";
  ctx.font = "18px Arial";

  if (t > 0.7) {
    ctx.fillText("Open net of a square-based pyramid", 205, 430);
  } else if (t < 0.3) {
    ctx.fillText("Closed square-based pyramid", 235, 430);
  } else {
    ctx.fillText("The triangular faces are folding up", 210, 430);
  }
}

draw();
</script>

</body>
</html>
