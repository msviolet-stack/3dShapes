<!DOCTYPE html>
<html>
<head>
  <title>Pyramid Net Interactive</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
    }
    h1 { color: #333; }
    canvas {
      background: white;
      border: 2px solid #ccc;
      margin-top: 10px;
    }
    button {
      font-size: 18px;
      padding: 10px 18px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: #ffcc33;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Pyramid Net Interactive</h1>
<p>Click the buttons to fold and unfold the pyramid.</p>

<button onclick="showNet()">Show Net</button>
<button onclick="showPyramid()">Fold into Pyramid</button>

<br>
<canvas id="canvas" width="700" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function triangle(x1, y1, x2, y2, x3, y3, colour, label) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.closePath();
  ctx.fillStyle = colour;
  ctx.fill();
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "black";
  ctx.font = "18px Arial";
  ctx.fillText(label, (x1 + x2 + x3) / 3 - 20, (y1 + y2 + y3) / 3);
}

function square(x, y, size, colour, label) {
  ctx.fillStyle = colour;
  ctx.fillRect(x, y, size, size);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, size, size);

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText(label, x + 35, y + 55);
}

function showNet() {
  clearCanvas();

  const x = 300;
  const y = 200;
  const s = 100;

  square(x, y, s, "#ffd633", "Base");

  triangle(x, y, x + s, y, x + s/2, y - 100, "#ffeb80", "Face");
  triangle(x, y + s, x + s, y + s, x + s/2, y + s + 100, "#ffeb80", "Face");
  triangle(x, y, x, y + s, x - 100, y + s/2, "#ffeb80", "Face");
  triangle(x + s, y, x + s, y + s, x + s + 100, y + s/2, "#ffeb80", "Face");

  ctx.font = "18px Arial";
  ctx.fillStyle = "#333";
  ctx.fillText("This is the net of a square-based pyramid.", 190, 430);
}

function showPyramid() {
  clearCanvas();

  const apexX = 350;
  const apexY = 100;

  const base1 = {x: 250, y: 300};
  const base2 = {x: 450, y: 300};
  const base3 = {x: 410, y: 380};
  const base4 = {x: 290, y: 380};

  // base
  ctx.beginPath();
  ctx.moveTo(base1.x, base1.y);
  ctx.lineTo(base2.x, base2.y);
  ctx.lineTo(base3.x, base3.y);
  ctx.lineTo(base4.x, base4.y);
  ctx.closePath();
  ctx.fillStyle = "#ffd633";
  ctx.fill();
  ctx.stroke();

  // faces
  triangle(apexX, apexY, base1.x, base1.y, base2.x, base2.y, "#ffeb80", "");
  triangle(apexX, apexY, base2.x, base2.y, base3.x, base3.y, "#ffe066", "");
  triangle(apexX, apexY, base3.x, base3.y, base4.x, base4.y, "#ffdb4d", "");
  triangle(apexX, apexY, base4.x, base4.y, base1.x, base1.y, "#fff099", "");

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Square-based Pyramid", 250, 440);
}

// Start with net
showNet();
</script>

</body>
</html>
